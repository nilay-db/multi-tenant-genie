# Copy to config.yaml (gitignored) and fill in. Pattern B: ONE shared Service Principal
# for ALL tenants. There are NO per-tenant secrets — the tenant rides in a per-request
# token claim. That is the whole point of Pattern B.
workspace_url: "https://<your-workspace>.cloud.databricks.com"
warehouse_id: "<sql-warehouse-id>"

# Genie space built over the dynamic view orders_secure_b (run_as = VIEWER).
genie_space_id: "<genie-space-id-over-orders_secure_b>"

catalog: "nt_workspace_catalog"
schema: "kustom_claims_demo"

# The single shared SP. Per request the host app mints a token from this SP with
# custom_claim=<tenant>. The SP gets SELECT on the VIEW only; its base-table SELECT is
# REVOKED, so it cannot bypass the view (see provision.py / README).
app_sp:
  client_id: "<shared-sp-app-id>"
  client_secret: "<shared-sp-oauth-secret>"

# Identity that OWNS orders_secure_b (definer's rights). Must hold base SELECT and must
# NOT be the shared SP. Used by provision.py to transfer ownership after creation.
view_owner: "<admin-user-or-group-that-owns-the-view>"

# Tenants are just claim values the host app resolves from its own login. NO per-tenant
# secrets here — that is the whole point of Pattern B.
tenants:
  - name: "Cafe Aurora"
    claim: "M001"
  - name: "Velocity Sportswear"
    claim: "M002"
  - name: "Nordic Hardware"
    claim: "M003"

questions:
  - "What was my total revenue?"
  - "What are my top 3 products by revenue?"
  - "How many orders did I have?"
