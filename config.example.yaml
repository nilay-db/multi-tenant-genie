# Copy to config.yaml (gitignored) and fill in. ONE shared Service Principal for all tenants.
workspace_url: "https://<your-workspace>.cloud.databricks.com"
warehouse_id: "<sql-warehouse-id>"

# --mode rowfilter (default): Genie space over the `orders` table (row filter applied).
genie_space_id: "<genie-space-id-over-orders>"
# --mode dv: Genie space over the dynamic secure VIEW `orders_secure_dv` (see provision_dv.py).
genie_space_id_dv: "<genie-space-id-over-orders_secure_dv>"

catalog: "nt_workspace_catalog"
schema: "kustom_claims_demo"

# The single shared SP. Per request the host app mints a token from this SP with
# custom_claim=<tenant claim>.
#  - rowfilter mode: the SP must OWN the orders table (see provision.py / README).
#  - dv mode: the SP gets SELECT on the VIEW only; its base-table SELECT is REVOKED, and the
#    VIEW is owned by a definer identity that holds base SELECT (see provision_dv.py / README).
app_sp:
  client_id: "<shared-sp-app-id>"
  client_secret: "<shared-sp-oauth-secret>"

# Identity that OWNS orders_secure_dv (definer's rights). Must hold base SELECT and must
# NOT be the merchant SP. Used by provision_dv.py. Defaults to the provisioning admin.
view_owner: "<admin-user-or-group-that-owns-the-view>"

# Tenants are just claim values the host app would resolve from its own login.
# There are NO per-tenant secrets here — that's the whole point of Pattern B.
tenants:
  - name: "Cafe Aurora"
    claim: "M001"
  - name: "Velocity Sportswear"
    claim: "M002"
  - name: "Nordic Hardware"
    claim: "M003"

questions:
  - "What was my total revenue?"
  - "What are my top 3 products by revenue?"
  - "How many orders did I have?"
